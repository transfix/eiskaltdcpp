    - name: Re-run CMake configure (restore install metadata)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \

  package-macos-gtk3:
    name: Package macOS GTK3 DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare, build-macos-gtk3]
    env:
      AP: ${{ needs.prepare.outputs.artifact_prefix }}
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        brew update
        brew install cmake ninja gettext openssl@3 bzip2 zlib \
          miniupnpc libidn2 pcre2 lua aspell \
          gtk+3 adwaita-icon-theme librsvg

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.AP }}-macos-${{ matrix.arch }}-gtk3-Release-buildtree
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        export HOMEBREW="$(brew --prefix)"
        export PKG_CONFIG_PATH="$HOMEBREW/lib/pkgconfig:$HOMEBREW/share/pkgconfig:${PKG_CONFIG_PATH:-}"
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$PWD/dist" \
          -DCMAKE_PREFIX_PATH="$HOMEBREW/opt/openssl@3;$HOMEBREW/opt/gettext;$HOMEBREW" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DUSE_LIBNOTIFY=OFF \
          -DUSE_LIBCANBERRA=OFF \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=OFF

    - name: Install
      run: cmake --install build

    - name: Create app bundle and bundle libraries
      run: |
        HOMEBREW="$(brew --prefix)"
        APP_DIR="dist/EiskaltDC++.app"
        # If the GTK build didn't produce an .app bundle, create one
        if [ ! -d "$APP_DIR" ]; then
          APP_DIR="dist/eiskaltdcpp-gtk.app"
        fi
        if [ ! -d "$APP_DIR" ]; then
          # Create a minimal .app bundle from the installed binary
          APP_DIR="dist/EiskaltDC++-GTK.app"
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"
          cp dist/bin/eiskaltdcpp-gtk "$APP_DIR/Contents/MacOS/eiskaltdcpp-gtk"
          # Copy data files into the bundle
          if [ -d dist/share ]; then
            cp -R dist/share "$APP_DIR/Contents/Resources/share"
          fi
          # Create Info.plist
          VERSION=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/')
          /usr/bin/python3 -c "
        import sys
        v = sys.argv[1]
        print('''<?xml version=\"1.0\" encoding=\"UTF-8\"?>
        <!DOCTYPE plist PUBLIC \"-//Apple Computer//DTD PLIST 1.0//EN\" \"https://www.apple.com/DTDs/PropertyList-1.0.dtd\">
        <plist version=\"1.0\">
        <dict>
          <key>CFBundleDevelopmentRegion</key><string>English</string>
          <key>CFBundleExecutable</key><string>eiskaltdcpp-gtk</string>
          <key>CFBundleIdentifier</key><string>com.github.eiskaltdcpp-gtk</string>
          <key>CFBundleName</key><string>EiskaltDC++ GTK</string>
          <key>CFBundleShortVersionString</key><string>%s</string>
          <key>CFBundleVersion</key><string>%s</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>NSHighResolutionCapable</key><true/>
        </dict>
        </plist>''' % (v, v))
        " "$VERSION" > "$APP_DIR/Contents/Info.plist"
        fi

        # Bundle shared library dependencies using dylibbundler
        brew install dylibbundler
        EXEC_PATH=$(find "$APP_DIR/Contents/MacOS" -type f -perm +111 | head -1)
        dylibbundler -od -b \
          -x "$EXEC_PATH" \
          -d "$APP_DIR/Contents/libs" \
          -p @executable_path/../libs/ \
          -s "$HOMEBREW/lib" \
          2>&1 || echo "dylibbundler warnings (non-fatal)"

        echo "=== App bundle contents ==="
        find "$APP_DIR" -type f | head -50

    - name: Build DMG
      run: |
        cd build
        cpack -G DragNDrop --verbose
        ls -la *.dmg

    - name: Upload DMG
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-macos-${{ matrix.arch }}-gtk3-dmg
        path: build/*.dmg

  # ─── Release ───────────────────────────────────────────────────────

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-windows-qt6
      - build-windows-gtk3
      - build-linux-qt6
      - build-linux-gtk3
      - build-macos-qt6
      - build-macos-gtk3
      - package-linux-qt6
      - package-linux-gtk3
      - package-linux-qt6-appimage
      - package-macos-qt6
      - package-macos-gtk3
    env:
      AP: ${{ needs.prepare.outputs.artifact_prefix }}

    steps:
    - uses: actions/checkout@v4

    - name: Download all packaging artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets/

    - name: Prepare release files
      run: |
        mkdir -p release
        TAG="${GITHUB_REF#refs/tags/}"
        # Zip Windows Qt6 (Debug + Release)
        for bt in Debug Release; do
          dir="release-assets/${AP}-windows-x64-qt6-${bt}"
          if [ -d "$dir" ]; then
            (cd "$dir" && zip -r "../../release/EiskaltDC++-Qt6-${TAG}-windows-x64-${bt}.zip" .)
          fi
        done
        # Zip Windows GTK3 (Debug + Release)
        for bt in Debug Release; do
          dir="release-assets/${AP}-windows-x64-gtk3-${bt}"
          if [ -d "$dir" ]; then
            (cd "$dir" && zip -r "../../release/EiskaltDC++-GTK3-${TAG}-windows-x64-${bt}.zip" .)
          fi
        done
        # Zip Linux Qt6 Debug
        dir="release-assets/${AP}-linux-x64-qt6-Debug"
        if [ -d "$dir" ]; then
          (cd "$dir" && zip -r "../../release/EiskaltDC++-Qt6-${TAG}-linux-x64-Debug.zip" .)
        fi
        # Zip Linux GTK3 Debug
        dir="release-assets/${AP}-linux-x64-gtk3-Debug"
        if [ -d "$dir" ]; then
          (cd "$dir" && zip -r "../../release/EiskaltDC++-GTK3-${TAG}-linux-x64-Debug.zip" .)
        fi
        # Copy Linux .deb files (Release)
        find "release-assets/${AP}-linux-x64-qt6-deb" -name '*.deb' -exec cp {} release/ \; 2>/dev/null || true
        find "release-assets/${AP}-linux-x64-gtk3-deb" -name '*.deb' -exec cp {} release/ \; 2>/dev/null || true
        # Copy NSIS installer if present
        find "release-assets/${AP}-windows-x64-qt6-nsis-installer" -name '*.exe' -exec cp {} release/ \; 2>/dev/null || true
        # Copy WiX MSI installer if present
        find "release-assets/${AP}-windows-x64-qt6-msi-installer" -name '*.msi' -exec cp {} release/ \; 2>/dev/null || true
        # Copy Linux AppImage if present
        find "release-assets/${AP}-linux-x64-qt6-appimage" -name '*.AppImage' -exec cp {} release/ \; 2>/dev/null || true
        # Copy macOS DMG files (Release, arm64)
        for arch in arm64; do
          find "release-assets/${AP}-macos-${arch}-qt6-dmg" -name '*.dmg' -exec cp {} release/ \; 2>/dev/null || true
          find "release-assets/${AP}-macos-${arch}-gtk3-dmg" -name '*.dmg' -exec cp {} release/ \; 2>/dev/null || true
        done
        # Zip macOS Debug (arm64)
        for arch in arm64; do
          dir="release-assets/${AP}-macos-${arch}-qt6-Debug"
          if [ -d "$dir" ]; then
            (cd "$dir" && zip -r "../../release/EiskaltDC++-Qt6-${TAG}-macos-${arch}-Debug.zip" .)
          fi
          dir="release-assets/${AP}-macos-${arch}-gtk3-Debug"
          if [ -d "$dir" ]; then
            (cd "$dir" && zip -r "../../release/EiskaltDC++-GTK3-${TAG}-macos-${arch}-Debug.zip" .)
          fi
        done
        ls -la release/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "EiskaltDC++ ${{ github.ref_name }}"
        draft: false
        prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        generate_release_notes: true
        files: release/*
          miniupnpc libidn2 pcre2 lua aspell qt@6

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.AP }}-macos-${{ matrix.arch }}-qt6-Release-buildtree
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        export HOMEBREW="$(brew --prefix)"
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX="$PWD/dist" \
          -DCMAKE_PREFIX_PATH="$HOMEBREW/opt/qt@6;$HOMEBREW/opt/openssl@3;$HOMEBREW/opt/gettext;$HOMEBREW" \
          -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
          -DUSE_QT6=ON \

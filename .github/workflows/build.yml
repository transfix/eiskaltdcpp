name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-linux-qt6:
    name: Linux / Qt6
    runs-on: [self-hosted, linux, x64]

    steps:
    - uses: actions/checkout@v4

    - name: Ensure OpenGL headers are available
      run: |
        dpkg -s libgl-dev >/dev/null 2>&1 || sudo apt-get install -y --no-install-recommends libgl-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_QT6=ON \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  actions: write      # vcpkg binary caching via x-gha
  contents: write     # GitHub Releases

jobs:
  # ─── Version Info ──────────────────────────────────────────────────

  prepare:
    name: Prepare version info
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      short_sha: ${{ steps.info.outputs.short_sha }}
      artifact_prefix: ${{ steps.info.outputs.artifact_prefix }}
    steps:
    - uses: actions/checkout@v4
      with:
        sparse-checkout: CMakeLists.txt
        sparse-checkout-cone-mode: false
    - name: Compute version and artifact prefix
      id: info
      run: |
        version=$(sed -n 's/^set (APP_VERSION "\([^"]*\)").*/\1/p' CMakeLists.txt)
        short_sha="${GITHUB_SHA::7}"
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          dev_suffix=""
        else
          dev_suffix="+dev"
        fi
        echo "version=${version}" >> "$GITHUB_OUTPUT"
        echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
        echo "artifact_prefix=eiskaltdcpp-${version}${dev_suffix}-${short_sha}" >> "$GITHUB_OUTPUT"

  # ─── Build & Test ────────────────────────────────────────────────────

  build-linux-qt6:
    name: Linux / Qt6 (${{ matrix.build_type }})
    needs: prepare
    runs-on: ubuntu-24.04
    env:
      AP: ${{ needs.prepare.outputs.artifact_prefix }}
    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Install (Debug)
      if: matrix.build_type == 'Debug'
      run: DESTDIR="$PWD/dist" cmake --install build

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-linux-x64-qt6-${{ matrix.build_type }}-buildtree
        path: build/
        retention-days: 1

    - name: Upload distribution (Debug)
      if: matrix.build_type == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-linux-x64-qt6-Debug
        path: dist/
        retention-days: 3

  build-linux-gtk3:
    name: Linux / GTK3 (${{ matrix.build_type }})
    needs: prepare
    runs-on: ubuntu-24.04
    env:
      AP: ${{ needs.prepare.outputs.artifact_prefix }}
    strategy:
      matrix:
        build_type: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          libgtk-3-dev libnotify-dev libcanberra-dev libcanberra-gtk3-dev \
          libx11-dev libgl-dev libsqlite3-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Install (Debug)
      if: matrix.build_type == 'Debug'
      run: DESTDIR="$PWD/dist" cmake --install build

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-linux-x64-gtk3-${{ matrix.build_type }}-buildtree
        path: build/
        retention-days: 1

    - name: Upload distribution (Debug)
      if: matrix.build_type == 'Debug'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-linux-x64-gtk3-Debug
        path: dist/
        retention-days: 3

  build-windows-qt6:
    name: Windows / Qt6 / MSVC (${{ matrix.build_type }})
    needs: prepare
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    env:
      AP: ${{ needs.prepare.outputs.artifact_prefix }}
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
    - uses: actions/checkout@v4

    - name: Export GitHub Actions cache variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
        cache: true

    - name: Install vcpkg dependencies
      run: |
        vcpkg install --triplet x64-windows `
          openssl bzip2 zlib miniupnpc pcre2 lua `
          libiconv libidn2 gettext

    - name: Install gettext tools (MSYS2)
      shell: pwsh
      run: |
        # vcpkg provides libintl for linking; MSYS2 provides the CLI tools
        # (xgettext, msgfmt, msgmerge, etc.) needed for i18n processing
        C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed gettext

    - name: Add vcpkg tools to PATH
      shell: pwsh
      run: |
        $toolsBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/tools"
        if (Test-Path $toolsBase) {
          Get-ChildItem -Path $toolsBase -Directory -Recurse |
            Where-Object { Get-ChildItem $_.FullName -Filter "*.exe" -ErrorAction SilentlyContinue } |
            ForEach-Object { echo $_.FullName >> $env:GITHUB_PATH }
        }
        echo "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin" >> $env:GITHUB_PATH

    - name: Configure
      run: |
        $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DCMAKE_INSTALL_PREFIX="$PWD/dist" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DGETTEXT_SEARCH_PATH="$vcpkgBase" `
          -DUSE_QT6=ON `
          -DUSE_GTK3=OFF `
          -DUSE_JS=ON `
          -DUSE_QT_QML=OFF `
          -DUSE_MINIUPNP=ON `
          -DWITH_DHT=ON `
          -DUSE_IDN2=ON `
          -DLUA_SCRIPT=ON `
          -DPERL_REGEX=ON `
          -DUSE_ASPELL=OFF `
          -DDBUS_NOTIFY=OFF `
          -DWITH_EMOTICONS=ON `
          -DWITH_SOUNDS=ON `
          -DWITH_DEV_FILES=OFF `
          -DBUILD_TESTS=ON `
          -DOPENSSL_MSVC=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Install
      shell: pwsh
      run: cmake --install build --config ${{ matrix.build_type }}

    - name: Deploy Qt DLLs
      shell: pwsh
      run: |
        $deployFlag = if ('${{ matrix.build_type }}' -eq 'Debug') { '--debug' } else { '--release' }
        $exePath = Get-ChildItem dist/*.exe | Select-Object -First 1
        if (-not $exePath) { Write-Error "No exe found in dist/"; exit 1 }
        Write-Host "Running windeployqt on $($exePath.FullName)"
        # Deploy Qt DLLs and plugins.  --no-compiler-runtime prevents adding
        # the VC++ Redistributable installer; the dumpbin step below copies the
        # actual runtime DLLs (msvcp140, vcruntime140, etc.) from System32.
        windeployqt $deployFlag --no-translations --no-compiler-runtime $exePath.FullName

        # Create qt.conf so Qt finds plugins relative to the exe directory.
        # Without this, Qt falls back to the hardcoded install prefix from
        # the CI build machine, which doesn't exist on the user's machine.
        @"
        [Paths]
        Plugins = .
        "@ -replace '^\s+','' | Set-Content "$($exePath.DirectoryName)/qt.conf" -Encoding UTF8

    - name: Resolve and copy DLL dependencies (dumpbin)
      shell: pwsh
      run: |
        $installDir = "dist"
        $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
        $searchPaths = if ('${{ matrix.build_type }}' -eq 'Debug') {
          @("$vcpkgBase/debug/bin", "$vcpkgBase/bin")
        } else {
          @("$vcpkgBase/bin")
        }

        $vcRuntimeRe = '^(msvcp\d|vcruntime\d|concrt\d|ucrtbase|vcomp\d)'

        $visited = [System.Collections.Generic.HashSet[string]]::new(
                     [System.StringComparer]::OrdinalIgnoreCase)
        $toCopy  = [ordered]@{}
        $queue   = [System.Collections.Queue]::new()

        # Seed with all exe and dll files in the install tree
        Get-ChildItem $installDir -Recurse -Include *.exe,*.dll -ErrorAction SilentlyContinue |
          ForEach-Object { $queue.Enqueue($_.FullName) }

        while ($queue.Count -gt 0) {
          $file     = $queue.Dequeue()
          $fileName = [IO.Path]::GetFileName($file)
          if (-not $visited.Add($fileName)) { continue }

          $deps = & dumpbin /nologo /dependents $file 2>&1 |
                  Select-String '^\s+(\S+\.dll)\s*$' |
                  ForEach-Object { $_.Matches.Groups[1].Value }

          foreach ($dep in $deps) {
            if ($visited.Contains($dep))                                    { continue }
            if ($dep -like 'api-ms-*' -or $dep -like 'ext-ms-*')           { continue }

            # Already in install dir?
            $inInstall = Get-ChildItem "$installDir/$dep" -ErrorAction SilentlyContinue
            if ($inInstall) {
              $queue.Enqueue($inInstall.FullName)
              continue
            }

            # Search vcpkg
            $found = $false
            foreach ($sp in $searchPaths) {
              $candidate = Join-Path $sp $dep
              if (Test-Path $candidate) {
                $toCopy[$dep] = $candidate
                $queue.Enqueue($candidate)
                $found = $true
                break
              }
            }
            if ($found) { continue }

            # VC runtime from System32
            if ($dep -match $vcRuntimeRe) {
              $sys32 = Join-Path $env:SystemRoot "System32/$dep"
              if (Test-Path $sys32) { $toCopy[$dep] = $sys32 }
            }
          }
        }

        foreach ($entry in $toCopy.GetEnumerator()) {
          Copy-Item $entry.Value "$installDir/"
          Write-Host "  dumpbin: $($entry.Key)  <-  $($entry.Value)"
        }

        Write-Host "`n=== Install directory contents ==="
        Get-ChildItem $installDir -Recurse | ForEach-Object {
          $rel = $_.FullName.Substring((Resolve-Path $installDir).Path.Length + 1)
          Write-Host "  $rel"
        }

    - name: Install NSIS (Release only)
      if: matrix.build_type == 'Release'
      shell: pwsh
      run: |
        $maxRetries = 3
        for ($i = 1; $i -le $maxRetries; $i++) {
          Write-Host "Attempting to install NSIS (attempt $i/$maxRetries)..."
          choco install nsis -y --no-progress
          if ($LASTEXITCODE -eq 0) { break }
          if ($i -lt $maxRetries) {
            Write-Host "Chocolatey install failed (exit $LASTEXITCODE), retrying in 30s..."
            Start-Sleep -Seconds 30
          } else {
            throw "Failed to install NSIS after $maxRetries attempts"
          }
        }
        $nsisDir = "C:\Program Files (x86)\NSIS"
        echo "$nsisDir" >> $env:GITHUB_PATH
        Write-Host "NSIS installed: $(& "$nsisDir\makensis.exe" /VERSION 2>&1)"

    - name: Build NSIS installer (Release only)
      if: matrix.build_type == 'Release'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path install-nsis
        $version = (Select-String -Path CMakeLists.txt -Pattern 'set \(APP_VERSION "([^"]+)"' |
                    ForEach-Object { $_.Matches.Groups[1].Value }) | Select-Object -First 1
        cpack -G NSIS `
          -D "CPACK_PACKAGE_NAME=EiskaltDC++" `
          -D "CPACK_PACKAGE_VERSION=$version" `
          -D "CPACK_PACKAGE_FILE_NAME=EiskaltDC++-${version}-win64" `
          -D "CPACK_PACKAGE_VENDOR=EiskaltDC++ developers" `
          -D "CPACK_PACKAGE_DESCRIPTION_SUMMARY=EiskaltDC++ - Direct Connect and ADC client" `
          -D "CPACK_PACKAGE_DESCRIPTION=A cross-platform program that uses the Direct Connect and ADC protocols." `
          -D "CPACK_RESOURCE_FILE_LICENSE=$PWD/COPYING" `
          -D "CPACK_NSIS_DISPLAY_NAME=EiskaltDC++" `
          -D "CPACK_NSIS_PACKAGE_NAME=EiskaltDC++" `
          -D "CPACK_NSIS_INSTALL_ROOT=`$PROGRAMFILES64" `
          -D "CPACK_NSIS_ENABLE_UNINSTALL_BEFORE_INSTALL=ON" `
          -D "CPACK_INSTALLED_DIRECTORIES=$PWD/dist;." `
          -D "CPACK_PACKAGE_DIRECTORY=$PWD/install-nsis" `
          --verbose

    - name: Collect PDB files (Debug only)
      if: matrix.build_type == 'Debug'
      shell: pwsh
      run: |
        # MSVC generates .pdb files alongside compiled binaries in the build
        # tree but cmake --install does not copy them.  Collect PDBs that
        # match our own exe/dll names into the dist/ directory so they are
        # included in the debug artifact for symbol-level debugging.
        $ownBinaries = Get-ChildItem dist -Filter *.exe |
                       ForEach-Object { $_.BaseName }
        # Also grab the shared library PDB (eiskaltdcpp.pdb / dcpp.pdb)
        $ownBinaries += Get-ChildItem dist -Filter *.dll |
                        Where-Object { $_.Name -like 'eiskaltdcpp*' -or $_.Name -like 'dcpp*' } |
                        ForEach-Object { $_.BaseName }
        $found = 0
        foreach ($name in $ownBinaries) {
          $pdbs = Get-ChildItem build -Recurse -Filter "$name.pdb" -ErrorAction SilentlyContinue
          foreach ($pdb in $pdbs) {
            Copy-Item $pdb.FullName dist/
            Write-Host "  PDB: $($pdb.Name)  <-  $($pdb.FullName)"
            $found++
          }
        }
        # Also grab any PDB generated by the linker for our targets
        Get-ChildItem build -Recurse -Filter '*.pdb' -ErrorAction SilentlyContinue |
          Where-Object { $_.DirectoryName -notlike '*_deps*' -and $_.DirectoryName -notlike '*tests*' -and $_.DirectoryName -notlike '*CMakeFiles*\CompilerIdCXX*' } |
          ForEach-Object {
            $dest = "dist/$($_.Name)"
            if (-not (Test-Path $dest)) {
              Copy-Item $_.FullName $dest
              Write-Host "  PDB: $($_.Name)  <-  $($_.FullName)"
              $found++
            }
          }
        Write-Host "`nCollected $found PDB file(s)"

    - name: Upload distribution
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-windows-x64-qt6-${{ matrix.build_type }}
        path: dist/

    - name: Upload NSIS installer
      if: matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-windows-x64-qt6-nsis-installer
        path: install-nsis/*.exe

    - name: Install WiX Toolset (Release only)
      if: matrix.build_type == 'Release'
      shell: pwsh
      run: |
        $maxRetries = 3
        for ($i = 1; $i -le $maxRetries; $i++) {
          Write-Host "Attempting to install WiX Toolset (attempt $i/$maxRetries)..."
          choco install wixtoolset -y --no-progress
          if ($LASTEXITCODE -eq 0) { break }
          if ($i -lt $maxRetries) {
            Write-Host "Chocolatey install failed (exit $LASTEXITCODE), retrying in 30s..."
            Start-Sleep -Seconds 30
          } else {
            throw "Failed to install WiX Toolset after $maxRetries attempts"
          }
        }
        # Locate the WiX v3 bin directory (candle.exe / light.exe) and add to PATH
        $wixBin = Get-ChildItem 'C:\Program Files (x86)' -Filter 'WiX Toolset v3*' -Directory -ErrorAction SilentlyContinue |
                  Sort-Object Name -Descending |
                  Select-Object -First 1 |
                  ForEach-Object { Join-Path $_.FullName 'bin' }
        if (-not $wixBin -or -not (Test-Path "$wixBin/candle.exe")) {
          throw "WiX bin directory with candle.exe not found after install"
        }
        echo "$wixBin" >> $env:GITHUB_PATH
        Write-Host "WiX installed at: $wixBin"

    - name: Build MSI installer (Release only)
      if: matrix.build_type == 'Release'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path install-msi
        $version = (Select-String -Path CMakeLists.txt -Pattern 'set \(APP_VERSION "([^"]+)"' |
                    ForEach-Object { $_.Matches.Groups[1].Value }) | Select-Object -First 1
        # WiX requires the license file to have a .txt or .rtf extension;
        # the repo's COPYING has none, so stage a .txt copy for the dialog.
        Copy-Item COPYING license.txt -Force
        cpack -G WIX `
          -D "CPACK_PACKAGE_NAME=EiskaltDC++" `
          -D "CPACK_PACKAGE_VERSION=$version" `
          -D "CPACK_PACKAGE_FILE_NAME=EiskaltDC++-${version}-win64" `
          -D "CPACK_PACKAGE_VENDOR=EiskaltDC++ developers" `
          -D "CPACK_PACKAGE_DESCRIPTION_SUMMARY=EiskaltDC++ - Direct Connect and ADC client" `
          -D "CPACK_PACKAGE_DESCRIPTION=A cross-platform program that uses the Direct Connect and ADC protocols." `
          -D "CPACK_PACKAGE_INSTALL_DIRECTORY=EiskaltDC++" `
          -D "CPACK_RESOURCE_FILE_LICENSE=$PWD/license.txt" `
          -D "CPACK_WIX_UPGRADE_GUID=3865DE45-924A-4472-8C58-B436605A57A0" `
          -D "CPACK_WIX_PRODUCT_GUID=*" `
          -D "CPACK_WIX_SIZEOF_VOID_P=8" `
          -D "CPACK_WIX_PROGRAM_MENU_FOLDER=EiskaltDC++" `
          -D "CPACK_INSTALLED_DIRECTORIES=$PWD/dist;." `
          -D "CPACK_PACKAGE_DIRECTORY=$PWD/install-msi" `
          --verbose

    - name: Upload MSI installer
      if: matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-windows-x64-qt6-msi-installer
        path: install-msi/*.msi

  build-windows-gtk3:
    name: Windows / GTK3 / MSYS2 (${{ matrix.build_type }})
    needs: prepare
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    env:
      AP: ${{ needs.prepare.outputs.artifact_prefix }}

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-pkg-config
          mingw-w64-ucrt-x86_64-gtk3
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-bzip2
          mingw-w64-ucrt-x86_64-zlib
          mingw-w64-ucrt-x86_64-miniupnpc
          mingw-w64-ucrt-x86_64-pcre2
          mingw-w64-ucrt-x86_64-lua
          mingw-w64-ucrt-x86_64-libidn2
          mingw-w64-ucrt-x86_64-gettext-tools
          mingw-w64-ucrt-x86_64-gettext-runtime
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-libnotify

    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_INSTALL_PREFIX="$PWD/dist" \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=OFF \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=OFF \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DWITH_DEV_FILES=OFF \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Install
      run: cmake --install build --config ${{ matrix.build_type }}

    - name: Bundle DLLs and GTK3 runtime
      run: |
        # Copy DLL dependencies using ldd
        ldd dist/eiskaltdcpp-gtk.exe \
          | grep -i '/ucrt64/' \
          | awk '{print $3}' \
          | while read -r dll; do
              cp "$dll" dist/ 2>/dev/null || true
            done

        echo "=== Bundled DLLs ==="
        ls -1 dist/*.dll | wc -l

        # Bundle GTK3 runtime data
        mkdir -p dist/lib
        cp -r /ucrt64/lib/gdk-pixbuf-2.0 dist/lib/ 2>/dev/null || true
        LOADERS_DIR="dist/lib/gdk-pixbuf-2.0/2.10.0/loaders"
        if [ -d "$LOADERS_DIR" ]; then
          # Bundle DLL dependencies of pixbuf loader modules (e.g. librsvg for SVG)
          for loader_dll in "$LOADERS_DIR"/*.dll; do
            ldd "$loader_dll" 2>/dev/null \
              | grep -i '/ucrt64/' \
              | awk '{print $3}' \
              | while read -r dep; do
                  cp -n "$dep" dist/ 2>/dev/null || true
                done
          done
          # Generate loaders.cache — the runtime fixLoadersCacheWin32() in
          # wulfor.cc rewrites all DLL paths to absolute, so the exact format
          # from gdk-pixbuf-query-loaders doesn't matter much.  We still strip
          # paths to just "loaders/filename.dll" for readability.
          /ucrt64/bin/gdk-pixbuf-query-loaders.exe "$LOADERS_DIR"/*.dll > \
            "dist/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
          # Handle both forward-slash and backslash paths from query-loaders
          sed -i -E 's|"[^"]*[/\\]loaders[/\\]([^"]+\.dll)"|"loaders/\1"|g' \
            "dist/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
        fi
        mkdir -p dist/share/glib-2.0
        cp -r /ucrt64/share/glib-2.0/schemas dist/share/glib-2.0/ 2>/dev/null || true
        /ucrt64/bin/glib-compile-schemas dist/share/glib-2.0/schemas/ 2>/dev/null || true
        mkdir -p dist/share/icons
        cp -r /ucrt64/share/icons/Adwaita dist/share/icons/ 2>/dev/null || true
        cp -r /ucrt64/share/icons/hicolor dist/share/icons/ 2>/dev/null || true

        # Create launcher script — the exe sets its own GTK env vars via
        # setupGtkEnvironmentWin32(), so the script just needs to start it.
        printf '%s\r\n' \
          '@echo off' \
          'start "" "%~dp0eiskaltdcpp-gtk.exe" %*' \
          > dist/eiskaltdcpp-gtk.cmd

        echo "=== Install directory ==="
        find dist -type f | sort | head -100

    - name: Upload distribution
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-windows-x64-gtk3-${{ matrix.build_type }}
        path: dist/


    - name: Install and deploy Qt
      run: |
        cmake --install build
        # macdeployqt is run automatically via CMake install() on APPLE
        # Verify the app bundle exists
        ls -la dist/EiskaltDC++.app/Contents/MacOS/ || true

    - name: Build DMG
      run: |
        cd build
        cpack -G DragNDrop --verbose
        ls -la *.dmg


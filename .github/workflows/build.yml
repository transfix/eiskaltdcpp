name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────

  build-linux-qt6:
    name: Linux / Qt6
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: linux-qt6-build
        path: build/
        retention-days: 1

  build-linux-gtk3:
    name: Linux / GTK3
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          libgtk-3-dev libnotify-dev libcanberra-dev libcanberra-gtk3-dev \
          libx11-dev libgl-dev libsqlite3-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: linux-gtk3-build
        path: build/
        retention-days: 1

  build-windows-qt6:
    name: Windows / Qt6 / MSVC
    runs-on: windows-latest

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
    - uses: actions/checkout@v4

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
        cache: true

    - name: Install vcpkg dependencies
      run: |
        vcpkg install --triplet x64-windows `
          openssl bzip2 zlib miniupnpc pcre2 lua `
          libiconv libidn2 gettext

    - name: Add vcpkg tools to PATH
      shell: pwsh
      run: |
        $toolsBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/tools"
        if (Test-Path $toolsBase) {
          Get-ChildItem -Path $toolsBase -Directory -Recurse |
            Where-Object { Get-ChildItem $_.FullName -Filter "*.exe" -ErrorAction SilentlyContinue } |
            ForEach-Object { echo $_.FullName >> $env:GITHUB_PATH }
        }
        echo "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin" >> $env:GITHUB_PATH

    - name: Configure
      run: |
        $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DGETTEXT_SEARCH_PATH="$vcpkgBase" `
          -DUSE_QT6=ON `
          -DUSE_GTK3=OFF `
          -DUSE_JS=ON `
          -DUSE_QT_QML=OFF `
          -DUSE_MINIUPNP=ON `
          -DWITH_DHT=ON `
          -DUSE_IDN2=ON `
          -DLUA_SCRIPT=ON `
          -DPERL_REGEX=ON `
          -DUSE_ASPELL=OFF `
          -DDBUS_NOTIFY=OFF `
          -DWITH_EMOTICONS=ON `
          -DWITH_SOUNDS=ON `
          -DBUILD_TESTS=ON `
          -DOPENSSL_MSVC=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: windows-qt6-build
        path: build/
        retention-days: 1

  build-windows-gtk3:
    name: Windows / GTK3 / MSYS2
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-pkg-config
          mingw-w64-ucrt-x86_64-gtk3
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-bzip2
          mingw-w64-ucrt-x86_64-zlib
          mingw-w64-ucrt-x86_64-miniupnpc
          mingw-w64-ucrt-x86_64-pcre2
          mingw-w64-ucrt-x86_64-lua
          mingw-w64-ucrt-x86_64-libidn2
          mingw-w64-ucrt-x86_64-gettext-tools
          mingw-w64-ucrt-x86_64-gettext-runtime
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-libnotify

    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=OFF \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=OFF \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: windows-gtk3-build
        path: build/
        retention-days: 1

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext lcov \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Configure with coverage
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_FLAGS="--coverage" \
          -DCMAKE_CXX_FLAGS="--coverage" \
          -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Run tests
      run: ctest --test-dir build --output-on-failure

    - name: Collect coverage
      run: |
        # Capture coverage data (ignore gcov quirks with system headers)
        lcov --capture --directory build --output-file coverage.info \
          --rc lcov_branch_coverage=1 \
          --ignore-errors mismatch,gcov,inconsistent,source

        # Remove external/system headers, Catch2 sources, and test code from report
        lcov --remove coverage.info \
          '/usr/*' \
          '*/build/_deps/*' \
          '*/build/src/catch2/*' \
          '*/tests/*' \
          --output-file coverage.info \
          --rc lcov_branch_coverage=1 \
          --ignore-errors unused

        # Summary
        lcov --list coverage.info --rc lcov_branch_coverage=1

    - name: Generate HTML report
      run: |
        genhtml coverage.info \
          --output-directory coverage-report \
          --rc lcov_branch_coverage=1 \
          --ignore-errors unmapped,source \
          --title "EiskaltDC++ Test Coverage" \
          --legend

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/

  # ─── Packaging (depends on successful builds) ────────────────────────

  package-windows-qt6:
    name: Package Windows Qt6
    runs-on: windows-latest
    needs: build-windows-qt6

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows

    steps:
    - uses: actions/checkout@v4

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
        cache: true

    - name: Install vcpkg dependencies
      run: |
        vcpkg install --triplet x64-windows `
          openssl bzip2 zlib miniupnpc pcre2 lua `
          libiconv libidn2 gettext

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: windows-qt6-build
        path: build/

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path artifacts
        Copy-Item build/eiskaltdcpp-qt/eiskaltdcpp-qt.exe artifacts/
        windeployqt --release --no-translations artifacts/eiskaltdcpp-qt.exe
        $vcpkgBin = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin"
        $dllsToCopy = @(
          "libssl-*-x64.dll", "libcrypto-*-x64.dll",
          "bz2.dll", "zlib1.dll", "miniupnpc.dll",
          "pcre2-8.dll", "lua*.dll",
          "intl-*.dll", "iconv-*.dll",
          "idn2-*.dll", "unistring-*.dll",
          "charset-*.dll"
        )
        foreach ($pattern in $dllsToCopy) {
          $files = Get-ChildItem -Path $vcpkgBin -Filter $pattern -ErrorAction SilentlyContinue
          foreach ($f in $files) {
            Copy-Item $f.FullName artifacts/ -ErrorAction SilentlyContinue
          }
        }
        Copy-Item -Recurse data/emoticons artifacts/resources/emoticons -ErrorAction SilentlyContinue
        Copy-Item -Recurse data/sounds artifacts/resources/sounds -ErrorAction SilentlyContinue
        Copy-Item -Recurse data/icons artifacts/resources/icons -ErrorAction SilentlyContinue

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-qt6-windows-x64
        path: artifacts/

  package-windows-gtk3:
    name: Package Windows GTK3
    runs-on: windows-latest
    needs: build-windows-gtk3

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: false
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-gtk3
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-bzip2
          mingw-w64-ucrt-x86_64-zlib
          mingw-w64-ucrt-x86_64-miniupnpc
          mingw-w64-ucrt-x86_64-pcre2
          mingw-w64-ucrt-x86_64-lua
          mingw-w64-ucrt-x86_64-libidn2
          mingw-w64-ucrt-x86_64-gettext-runtime
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-libnotify

    - uses: actions/checkout@v4

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: windows-gtk3-build
        path: build/

    - name: Package
      run: |
        mkdir -p artifacts
        cp build/eiskaltdcpp-gtk/eiskaltdcpp-gtk.exe artifacts/
        MSYS_BIN="/ucrt64/bin"
        for dll in \
          libgtk-3-0.dll libgdk-3-0.dll libglib-2.0-0.dll libgobject-2.0-0.dll \
          libgio-2.0-0.dll libgmodule-2.0-0.dll libgthread-2.0-0.dll \
          libpango-1.0-0.dll libpangocairo-1.0-0.dll libpangoft2-1.0-0.dll \
          libpangowin32-1.0-0.dll libcairo-2.dll libcairo-gobject-2.dll \
          libgdk_pixbuf-2.0-0.dll libatk-1.0-0.dll libfribidi-0.dll \
          libepoxy-0.dll libharfbuzz-0.dll libfontconfig-1.dll libfreetype-6.dll \
          libpixman-1-0.dll libpng16-16.dll libbz2-1.dll zlib1.dll \
          libssl-3-x64.dll libcrypto-3-x64.dll \
          libminiupnpc.dll libpcre2-8-0.dll lua54.dll \
          libidn2-0.dll libintl-8.dll libiconv-2.dll libunistring-5.dll \
          libnotify-4.dll \
          libwinpthread-1.dll libgcc_s_seh-1.dll libstdc++-6.dll \
        ; do
          [ -f "$MSYS_BIN/$dll" ] && cp "$MSYS_BIN/$dll" artifacts/ || true
        done
        mkdir -p artifacts/resources
        cp -r data/emoticons artifacts/resources/emoticons || true
        cp -r data/sounds artifacts/resources/sounds || true
        cp -r data/icons artifacts/resources/icons || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-gtk3-windows-x64
        path: artifacts/

  package-linux-qt6:
    name: Package Linux Qt6
    runs-on: ubuntu-24.04
    needs: build-linux-qt6

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: linux-qt6-build
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=OFF

    - name: Build .deb package
      run: |
        DESTDIR="$(pwd)/pkg" cmake --install build
        PKG_VERSION=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/' | tr '+' '~')
        ARCH=$(dpkg --print-architecture)
        PKG_NAME="eiskaltdcpp-qt6_${PKG_VERSION}_${ARCH}"
        mkdir -p pkg/DEBIAN
        printf 'Package: eiskaltdcpp-qt6\n' > pkg/DEBIAN/control
        printf 'Version: %s\n' "$PKG_VERSION" >> pkg/DEBIAN/control
        printf 'Section: net\n' >> pkg/DEBIAN/control
        printf 'Priority: optional\n' >> pkg/DEBIAN/control
        printf 'Architecture: %s\n' "$ARCH" >> pkg/DEBIAN/control
        printf 'Depends: libc6, libstdc++6, libssl3t64, libbz2-1.0, zlib1g, libminiupnpc17, libidn2-0, libpcre2-8-0, liblua5.4-0, libaspell15, libqt6core6t64, libqt6gui6t64, libqt6widgets6t64, libqt6xml6t64, libqt6network6t64, libqt6concurrent6t64, libqt6multimedia6, libqt6sql6t64, libqt6svg6, libdbus-1-3\n' >> pkg/DEBIAN/control
        printf 'Maintainer: EiskaltDC++ developers\n' >> pkg/DEBIAN/control
        printf 'Description: EiskaltDC++ - Direct Connect client (Qt6 UI)\n' >> pkg/DEBIAN/control
        printf ' A cross-platform program that uses the Direct Connect and ADC protocols.\n' >> pkg/DEBIAN/control
        printf ' This package contains the Qt6 graphical user interface.\n' >> pkg/DEBIAN/control
        chmod 0755 pkg/DEBIAN
        chmod 0644 pkg/DEBIAN/control
        dpkg-deb --root-owner-group --build pkg "${PKG_NAME}.deb"

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-qt6-linux-deb
        path: "*.deb"

    - name: Build AppImage
      run: |
        # Install linuxdeploy + Qt plugin
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

        # Prepare AppDir from cmake install
        DESTDIR="$(pwd)/AppDir" cmake --install build

        # Create .desktop if missing
        mkdir -p AppDir/usr/share/applications
        if [ ! -f AppDir/usr/share/applications/eiskaltdcpp-qt.desktop ]; then
          printf '[Desktop Entry]\nType=Application\nName=EiskaltDC++\nExec=eiskaltdcpp-qt\nIcon=eiskaltdcpp\nCategories=Network;FileTransfer;\n' > AppDir/usr/share/applications/eiskaltdcpp-qt.desktop
        fi

        # Ensure icon exists
        mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
        find AppDir -name 'eiskaltdcpp.png' -size +1k | head -1 | xargs -I{} cp {} AppDir/usr/share/icons/hicolor/128x128/apps/eiskaltdcpp.png 2>/dev/null || true
        if [ ! -f AppDir/usr/share/icons/hicolor/128x128/apps/eiskaltdcpp.png ]; then
          find data/icons -name '*.png' | head -1 | xargs -I{} cp {} AppDir/usr/share/icons/hicolor/128x128/apps/eiskaltdcpp.png 2>/dev/null || true
        fi

        export QMAKE=$(which qmake6 2>/dev/null || which qmake)
        export VERSION=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/')
        export LD_LIBRARY_PATH="$(pwd)/AppDir/usr/lib:$LD_LIBRARY_PATH"
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --plugin qt --output appimage \
          --desktop-file AppDir/usr/share/applications/eiskaltdcpp-qt.desktop \
          --icon-file AppDir/usr/share/icons/hicolor/128x128/apps/eiskaltdcpp.png || true

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-qt6-linux-appimage
        path: "*.AppImage"
        if-no-files-found: warn

  package-linux-gtk3:
    name: Package Linux GTK3
    runs-on: ubuntu-24.04
    needs: build-linux-gtk3

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          libgtk-3-dev libnotify-dev libcanberra-dev libcanberra-gtk3-dev \
          libx11-dev libgl-dev libsqlite3-dev

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: linux-gtk3-build
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=OFF

    - name: Build .deb package
      run: |
        DESTDIR="$(pwd)/pkg" cmake --install build
        PKG_VERSION=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/' | tr '+' '~')
        ARCH=$(dpkg --print-architecture)
        PKG_NAME="eiskaltdcpp-gtk3_${PKG_VERSION}_${ARCH}"
        mkdir -p pkg/DEBIAN
        printf 'Package: eiskaltdcpp-gtk3\n' > pkg/DEBIAN/control
        printf 'Version: %s\n' "$PKG_VERSION" >> pkg/DEBIAN/control
        printf 'Section: net\n' >> pkg/DEBIAN/control
        printf 'Priority: optional\n' >> pkg/DEBIAN/control
        printf 'Architecture: %s\n' "$ARCH" >> pkg/DEBIAN/control
        printf 'Depends: libc6, libstdc++6, libssl3t64, libbz2-1.0, zlib1g, libminiupnpc17, libidn2-0, libpcre2-8-0, liblua5.4-0, libaspell15, libgtk-3-0t64, libnotify4, libcanberra0t64, libx11-6\n' >> pkg/DEBIAN/control
        printf 'Maintainer: EiskaltDC++ developers\n' >> pkg/DEBIAN/control
        printf 'Description: EiskaltDC++ - Direct Connect client (GTK3 UI)\n' >> pkg/DEBIAN/control
        printf ' A cross-platform program that uses the Direct Connect and ADC protocols.\n' >> pkg/DEBIAN/control
        printf ' This package contains the GTK3 graphical user interface.\n' >> pkg/DEBIAN/control
        chmod 0755 pkg/DEBIAN
        chmod 0644 pkg/DEBIAN/control
        dpkg-deb --root-owner-group --build pkg "${PKG_NAME}.deb"

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-gtk3-linux-deb
        path: "*.deb"

    - name: Build AppImage
      run: |
        wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
        chmod +x linuxdeploy-x86_64.AppImage

        DESTDIR="$(pwd)/AppDir" cmake --install build

        mkdir -p AppDir/usr/share/applications
        if [ ! -f AppDir/usr/share/applications/eiskaltdcpp-gtk.desktop ]; then
          printf '[Desktop Entry]\nType=Application\nName=EiskaltDC++ GTK\nExec=eiskaltdcpp-gtk\nIcon=eiskaltdcpp\nCategories=Network;FileTransfer;\n' > AppDir/usr/share/applications/eiskaltdcpp-gtk.desktop
        fi

        mkdir -p AppDir/usr/share/icons/hicolor/128x128/apps
        find AppDir -name 'eiskaltdcpp.png' -size +1k | head -1 | xargs -I{} cp {} AppDir/usr/share/icons/hicolor/128x128/apps/eiskaltdcpp.png 2>/dev/null || true
        if [ ! -f AppDir/usr/share/icons/hicolor/128x128/apps/eiskaltdcpp.png ]; then
          find data/icons -name '*.png' | head -1 | xargs -I{} cp {} AppDir/usr/share/icons/hicolor/128x128/apps/eiskaltdcpp.png 2>/dev/null || true
        fi

        export VERSION=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/')
        export LD_LIBRARY_PATH="$(pwd)/AppDir/usr/lib:$LD_LIBRARY_PATH"
        ./linuxdeploy-x86_64.AppImage --appdir AppDir --output appimage \
          --desktop-file AppDir/usr/share/applications/eiskaltdcpp-gtk.desktop \
          --icon-file AppDir/usr/share/icons/hicolor/128x128/apps/eiskaltdcpp.png || true

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-gtk3-linux-appimage
        path: "*.AppImage"
        if-no-files-found: warn
name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  actions: write      # vcpkg binary caching via x-gha
  contents: write     # GitHub Releases

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────

  build-linux-qt6:
    name: Linux / Qt6
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: linux-qt6-build
        path: build/
        retention-days: 1

  build-linux-gtk3:
    name: Linux / GTK3
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          libgtk-3-dev libnotify-dev libcanberra-dev libcanberra-gtk3-dev \
          libx11-dev libgl-dev libsqlite3-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: linux-gtk3-build
        path: build/
        retention-days: 1

  build-windows-qt6:
    name: Windows / Qt6 / MSVC (${{ matrix.build_type }})
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
    - uses: actions/checkout@v4

    - name: Export GitHub Actions cache variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
        cache: true

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: C:/vcpkg/installed
        key: vcpkg-x64-windows-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: vcpkg-x64-windows-

    - name: Install vcpkg dependencies
      run: |
        vcpkg install --triplet x64-windows `
          openssl bzip2 zlib miniupnpc pcre2 lua `
          libiconv libidn2 "gettext[tools]"

    - name: Add vcpkg tools to PATH
      shell: pwsh
      run: |
        $toolsBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/tools"
        if (Test-Path $toolsBase) {
          Get-ChildItem -Path $toolsBase -Directory -Recurse |
            Where-Object { Get-ChildItem $_.FullName -Filter "*.exe" -ErrorAction SilentlyContinue } |
            ForEach-Object { echo $_.FullName >> $env:GITHUB_PATH }
        }
        echo "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin" >> $env:GITHUB_PATH

    - name: Configure
      run: |
        $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DGETTEXT_SEARCH_PATH="$vcpkgBase" `
          -DUSE_QT6=ON `
          -DUSE_GTK3=OFF `
          -DUSE_JS=ON `
          -DUSE_QT_QML=OFF `
          -DUSE_MINIUPNP=ON `
          -DWITH_DHT=ON `
          -DUSE_IDN2=ON `
          -DLUA_SCRIPT=ON `
          -DPERL_REGEX=ON `
          -DUSE_ASPELL=OFF `
          -DDBUS_NOTIFY=OFF `
          -DWITH_EMOTICONS=ON `
          -DWITH_SOUNDS=ON `
          -DBUILD_TESTS=ON `
          -DOPENSSL_MSVC=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: windows-qt6-build-${{ matrix.build_type }}
        path: build/
        retention-days: 1

  build-windows-gtk3:
    name: Windows / GTK3 / MSYS2 (${{ matrix.build_type }})
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-pkg-config
          mingw-w64-ucrt-x86_64-gtk3
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-bzip2
          mingw-w64-ucrt-x86_64-zlib
          mingw-w64-ucrt-x86_64-miniupnpc
          mingw-w64-ucrt-x86_64-pcre2
          mingw-w64-ucrt-x86_64-lua
          mingw-w64-ucrt-x86_64-libidn2
          mingw-w64-ucrt-x86_64-gettext-tools
          mingw-w64-ucrt-x86_64-gettext-runtime
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-libnotify

    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=OFF \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=OFF \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: windows-gtk3-build-${{ matrix.build_type }}
        path: build/
        retention-days: 1

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext lcov \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Configure with coverage
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_FLAGS="--coverage" \
          -DCMAKE_CXX_FLAGS="--coverage" \
          -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Run tests
      run: ctest --test-dir build --output-on-failure

    - name: Collect coverage
      run: |
        # Capture coverage data (ignore gcov quirks with system headers)
        lcov --capture --directory build --output-file coverage.info \
          --rc lcov_branch_coverage=1 \
          --ignore-errors mismatch,gcov,inconsistent,source

        # Remove external/system headers, Catch2 sources, and test code from report
        lcov --remove coverage.info \
          '/usr/*' \
          '*/build/_deps/*' \
          '*/build/src/catch2/*' \
          '*/tests/*' \
          --output-file coverage.info \
          --rc lcov_branch_coverage=1 \
          --ignore-errors unused

        # Summary
        lcov --list coverage.info --rc lcov_branch_coverage=1

    - name: Generate HTML report
      run: |
        genhtml coverage.info \
          --output-directory coverage-report \
          --rc lcov_branch_coverage=1 \
          --ignore-errors unmapped,source \
          --title "EiskaltDC++ Test Coverage" \
          --legend

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/

  # ─── Packaging (depends on successful builds) ────────────────────────

  package-windows-qt6:
    name: Package Windows Qt6 (${{ matrix.build_type }})
    runs-on: windows-latest
    needs: build-windows-qt6

    strategy:
      matrix:
        build_type: [Debug, Release]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
    - uses: actions/checkout@v4

    - name: Export GitHub Actions cache variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Set up MSVC (for dumpbin)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
        cache: true

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: C:/vcpkg/installed
        key: vcpkg-x64-windows-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: vcpkg-x64-windows-

    - name: Install vcpkg dependencies
      run: |
        vcpkg install --triplet x64-windows `
          openssl bzip2 zlib miniupnpc pcre2 lua `
          libiconv libidn2 "gettext[tools]"

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: windows-qt6-build-${{ matrix.build_type }}
        path: build/

    - name: Package
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path artifacts
        Copy-Item 'build/eiskaltdcpp-qt/EiskaltDC++.exe' artifacts/

        # Copy PDB debug symbols when available
        Get-ChildItem 'build/eiskaltdcpp-qt/*.pdb' -ErrorAction SilentlyContinue |
          ForEach-Object { Copy-Item $_.FullName artifacts/ }

        # Deploy Qt DLLs and plugins
        $deployFlag = if ('${{ matrix.build_type }}' -eq 'Debug') { '--debug' } else { '--release' }
        windeployqt $deployFlag --no-translations 'artifacts/EiskaltDC++.exe'

        # --- Resolve remaining DLLs precisely using dumpbin /dependents ---
        $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
        $searchPaths = if ('${{ matrix.build_type }}' -eq 'Debug') {
          @("$vcpkgBase/debug/bin", "$vcpkgBase/bin")
        } else {
          @("$vcpkgBase/bin")
        }

        # VC runtime DLL name pattern (copy from System32)
        $vcRuntimeRe = '^(msvcp\d|vcruntime\d|concrt\d|ucrtbase|vcomp\d)'

        $visited = [System.Collections.Generic.HashSet[string]]::new(
                     [System.StringComparer]::OrdinalIgnoreCase)
        $toCopy  = [ordered]@{}
        $queue   = [System.Collections.Queue]::new()

        # Seed the walk with the exe and every DLL windeployqt already placed
        $queue.Enqueue((Resolve-Path 'artifacts/EiskaltDC++.exe').Path)
        Get-ChildItem artifacts/*.dll -ErrorAction SilentlyContinue |
          ForEach-Object { $queue.Enqueue($_.FullName) }

        while ($queue.Count -gt 0) {
          $file     = $queue.Dequeue()
          $fileName = [IO.Path]::GetFileName($file)
          if (-not $visited.Add($fileName)) { continue }

          # Parse dumpbin /dependents output for DLL names
          $deps = & dumpbin /nologo /dependents $file 2>&1 |
                  Select-String '^\s+(\S+\.dll)\s*$' |
                  ForEach-Object { $_.Matches.Groups[1].Value }

          foreach ($dep in $deps) {
            if ($visited.Contains($dep))                      { continue }
            if ($dep -like 'api-ms-*' -or $dep -like 'ext-ms-*') { continue }

            # Already in artifacts (placed by windeployqt or earlier iteration)?
            $inArtifacts = Join-Path artifacts $dep
            if (Test-Path $inArtifacts) {
              $queue.Enqueue((Resolve-Path $inArtifacts).Path)
              continue
            }

            # Search vcpkg bin directories
            $found = $false
            foreach ($sp in $searchPaths) {
              $candidate = Join-Path $sp $dep
              if (Test-Path $candidate) {
                $toCopy[$dep] = $candidate
                $queue.Enqueue($candidate)
                $found = $true
                break
              }
            }
            if ($found) { continue }

            # VC runtime → copy from System32
            if ($dep -match $vcRuntimeRe) {
              $sys32 = Join-Path $env:SystemRoot "System32/$dep"
              if (Test-Path $sys32) { $toCopy[$dep] = $sys32 }
            }
            # Otherwise it is a Windows system DLL (kernel32 etc.) — skip
          }
        }

        # Copy all resolved DLLs into the artifact directory
        foreach ($entry in $toCopy.GetEnumerator()) {
          Copy-Item $entry.Value artifacts/
          Write-Host "  dumpbin: $($entry.Key)  <-  $($entry.Value)"
        }

        # Summary
        Write-Host "`n=== Bundled DLLs ==="
        $bundled = Get-ChildItem artifacts/*.dll | Sort-Object Name
        Write-Host "Total: $($bundled.Count)"
        $bundled | ForEach-Object { Write-Host "  $($_.Name)" }

        # Bundle data files
        Copy-Item -Recurse data/emoticons artifacts/resources/emoticons -ErrorAction SilentlyContinue
        Copy-Item -Recurse data/sounds artifacts/resources/sounds -ErrorAction SilentlyContinue
        Copy-Item -Recurse data/icons artifacts/resources/icons -ErrorAction SilentlyContinue

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-qt6-windows-x64-${{ matrix.build_type }}
        path: artifacts/

  package-windows-gtk3:
    name: Package Windows GTK3 (${{ matrix.build_type }})
    runs-on: windows-latest
    needs: build-windows-gtk3

    strategy:
      matrix:
        build_type: [Debug, Release]

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: false
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-gtk3
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-bzip2
          mingw-w64-ucrt-x86_64-zlib
          mingw-w64-ucrt-x86_64-miniupnpc
          mingw-w64-ucrt-x86_64-pcre2
          mingw-w64-ucrt-x86_64-lua
          mingw-w64-ucrt-x86_64-libidn2
          mingw-w64-ucrt-x86_64-gettext-runtime
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-libnotify

    - uses: actions/checkout@v4

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: windows-gtk3-build-${{ matrix.build_type }}
        path: build/

    - name: Package
      run: |
        mkdir -p artifacts
        cp build/eiskaltdcpp-gtk/eiskaltdcpp-gtk.exe artifacts/
        MSYS_BIN="/ucrt64/bin"
        # Copy the executable's direct and transitive DLL dependencies
        # Use ldd to find all required DLLs from the MSYS2 environment
        ldd artifacts/eiskaltdcpp-gtk.exe \
          | grep -i '/ucrt64/' \
          | awk '{print $3}' \
          | while read -r dll; do
              cp "$dll" artifacts/ 2>/dev/null || true
            done
        # List bundled DLLs for CI log visibility
        echo "=== Bundled DLLs ==="
        ls -1 artifacts/*.dll | wc -l
        ls -1 artifacts/*.dll
        # Bundle GTK3 runtime data (pixbuf loaders, schemas, etc.)
        mkdir -p artifacts/lib
        cp -r /ucrt64/lib/gdk-pixbuf-2.0 artifacts/lib/ 2>/dev/null || true
        # Regenerate loaders.cache with relative paths
        LOADERS_DIR="artifacts/lib/gdk-pixbuf-2.0/2.10.0/loaders"
        if [ -d "$LOADERS_DIR" ]; then
          GDK_PIXBUF_MODULE_FILE="artifacts/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" \
          /ucrt64/bin/gdk-pixbuf-query-loaders.exe "$LOADERS_DIR"/*.dll > \
            "artifacts/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
          # Replace absolute paths with relative ones
          sed -i 's|.*/loaders/|lib/gdk-pixbuf-2.0/2.10.0/loaders/|g' \
            "artifacts/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
        fi
        mkdir -p artifacts/share/glib-2.0
        cp -r /ucrt64/share/glib-2.0/schemas artifacts/share/glib-2.0/ 2>/dev/null || true
        # Compile schemas in the bundle
        /ucrt64/bin/glib-compile-schemas artifacts/share/glib-2.0/schemas/ 2>/dev/null || true
        mkdir -p artifacts/share/icons
        cp -r /ucrt64/share/icons/Adwaita artifacts/share/icons/ 2>/dev/null || true
        cp -r /ucrt64/share/icons/hicolor artifacts/share/icons/ 2>/dev/null || true
        mkdir -p artifacts/resources
        cp -r data/emoticons artifacts/resources/emoticons || true
        cp -r data/sounds artifacts/resources/sounds || true
        cp -r data/icons artifacts/resources/icons || true
        # Create a launcher script that sets GTK environment variables
        cat > artifacts/eiskaltdcpp-gtk.cmd << 'LAUNCHER'
        @echo off
        set "HERE=%~dp0"
        set "GDK_PIXBUF_MODULE_FILE=%HERE%lib\gdk-pixbuf-2.0\2.10.0\loaders.cache"
        set "GDK_PIXBUF_MODULEDIR=%HERE%lib\gdk-pixbuf-2.0\2.10.0\loaders"
        set "GSETTINGS_SCHEMA_DIR=%HERE%share\glib-2.0\schemas"
        set "GTK_EXE_PREFIX=%HERE%"
        set "XDG_DATA_DIRS=%HERE%share"
        start "" "%HERE%eiskaltdcpp-gtk.exe" %*
LAUNCHER
        # Remove leading spaces from heredoc
        sed -i 's/^        //' artifacts/eiskaltdcpp-gtk.cmd

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-gtk3-windows-x64-${{ matrix.build_type }}
        path: artifacts/

  package-linux-qt6:
    name: Package Linux Qt6
    runs-on: ubuntu-24.04
    needs: build-linux-qt6

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: linux-qt6-build
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=OFF

    - name: Build .deb package
      run: |
        DESTDIR="$(pwd)/pkg" cmake --install build
        PKG_VERSION=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/' | tr '+' '~')
        ARCH=$(dpkg --print-architecture)
        PKG_NAME="eiskaltdcpp-qt6_${PKG_VERSION}_${ARCH}"
        mkdir -p pkg/DEBIAN
        printf 'Package: eiskaltdcpp-qt6\n' > pkg/DEBIAN/control
        printf 'Version: %s\n' "$PKG_VERSION" >> pkg/DEBIAN/control
        printf 'Section: net\n' >> pkg/DEBIAN/control
        printf 'Priority: optional\n' >> pkg/DEBIAN/control
        printf 'Architecture: %s\n' "$ARCH" >> pkg/DEBIAN/control
        printf 'Depends: libc6, libstdc++6, libssl3t64, libbz2-1.0, zlib1g, libminiupnpc17, libidn2-0, libpcre2-8-0, liblua5.4-0, libaspell15, libqt6core6t64, libqt6gui6t64, libqt6widgets6t64, libqt6xml6t64, libqt6network6t64, libqt6concurrent6t64, libqt6multimedia6, libqt6sql6t64, libqt6svg6, libdbus-1-3\n' >> pkg/DEBIAN/control
        printf 'Maintainer: EiskaltDC++ developers\n' >> pkg/DEBIAN/control
        printf 'Description: EiskaltDC++ - Direct Connect client (Qt6 UI)\n' >> pkg/DEBIAN/control
        printf ' A cross-platform program that uses the Direct Connect and ADC protocols.\n' >> pkg/DEBIAN/control
        printf ' This package contains the Qt6 graphical user interface.\n' >> pkg/DEBIAN/control
        chmod 0755 pkg/DEBIAN
        chmod 0644 pkg/DEBIAN/control
        dpkg-deb --root-owner-group --build pkg "${PKG_NAME}.deb"

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-qt6-linux-deb
        path: "*.deb"

  package-linux-gtk3:
    name: Package Linux GTK3
    runs-on: ubuntu-24.04
    needs: build-linux-gtk3

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          libgtk-3-dev libnotify-dev libcanberra-dev libcanberra-gtk3-dev \
          libx11-dev libgl-dev libsqlite3-dev

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: linux-gtk3-build
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=OFF

    - name: Build .deb package
      run: |
        DESTDIR="$(pwd)/pkg" cmake --install build
        PKG_VERSION=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/' | tr '+' '~')
        ARCH=$(dpkg --print-architecture)
        PKG_NAME="eiskaltdcpp-gtk3_${PKG_VERSION}_${ARCH}"
        mkdir -p pkg/DEBIAN
        printf 'Package: eiskaltdcpp-gtk3\n' > pkg/DEBIAN/control
        printf 'Version: %s\n' "$PKG_VERSION" >> pkg/DEBIAN/control
        printf 'Section: net\n' >> pkg/DEBIAN/control
        printf 'Priority: optional\n' >> pkg/DEBIAN/control
        printf 'Architecture: %s\n' "$ARCH" >> pkg/DEBIAN/control
        printf 'Depends: libc6, libstdc++6, libssl3t64, libbz2-1.0, zlib1g, libminiupnpc17, libidn2-0, libpcre2-8-0, liblua5.4-0, libaspell15, libgtk-3-0t64, libnotify4, libcanberra0t64, libx11-6\n' >> pkg/DEBIAN/control
        printf 'Maintainer: EiskaltDC++ developers\n' >> pkg/DEBIAN/control
        printf 'Description: EiskaltDC++ - Direct Connect client (GTK3 UI)\n' >> pkg/DEBIAN/control
        printf ' A cross-platform program that uses the Direct Connect and ADC protocols.\n' >> pkg/DEBIAN/control
        printf ' This package contains the GTK3 graphical user interface.\n' >> pkg/DEBIAN/control
        chmod 0755 pkg/DEBIAN
        chmod 0644 pkg/DEBIAN/control
        dpkg-deb --root-owner-group --build pkg "${PKG_NAME}.deb"

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-gtk3-linux-deb
        path: "*.deb"

  # ─── Release ───────────────────────────────────────────────────────

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs:
      - package-windows-qt6
      - package-windows-gtk3
      - package-linux-qt6
      - package-linux-gtk3

    steps:
    - uses: actions/checkout@v4

    - name: Download all packaging artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets/

    - name: Prepare release files
      run: |
        mkdir -p release
        TAG="${GITHUB_REF#refs/tags/}"
        # Zip Windows Qt6 (Debug + Release)
        for bt in Debug Release; do
          dir="release-assets/eiskaltdcpp-qt6-windows-x64-${bt}"
          if [ -d "$dir" ]; then
            (cd "$dir" && zip -r "../../release/EiskaltDC++-Qt6-${TAG}-windows-x64-${bt}.zip" .)
          fi
        done
        # Zip Windows GTK3 (Debug + Release)
        for bt in Debug Release; do
          dir="release-assets/eiskaltdcpp-gtk3-windows-x64-${bt}"
          if [ -d "$dir" ]; then
            (cd "$dir" && zip -r "../../release/EiskaltDC++-GTK3-${TAG}-windows-x64-${bt}.zip" .)
          fi
        done
        # Copy Linux .deb files
        find release-assets/eiskaltdcpp-qt6-linux-deb -name '*.deb' -exec cp {} release/ \; 2>/dev/null || true
        find release-assets/eiskaltdcpp-gtk3-linux-deb -name '*.deb' -exec cp {} release/ \; 2>/dev/null || true
        ls -la release/

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        name: "EiskaltDC++ ${{ github.ref_name }}"
        draft: false
        prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
        generate_release_notes: true
        files: release/*
name: Build

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]

permissions:
  actions: write      # vcpkg binary caching via x-gha
  contents: write     # GitHub Releases

jobs:
  # ─── Build & Test ────────────────────────────────────────────────────

  build-linux-qt6:
    name: Linux / Qt6
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: linux-qt6-build
        path: build/
        retention-days: 1

  build-linux-gtk3:
    name: Linux / GTK3
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          libgtk-3-dev libnotify-dev libcanberra-dev libcanberra-gtk3-dev \
          libx11-dev libgl-dev libsqlite3-dev

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: linux-gtk3-build
        path: build/
        retention-days: 1

  build-windows-qt6:
    name: Windows / Qt6 / MSVC (${{ matrix.build_type }})
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
    - uses: actions/checkout@v4

    - name: Export GitHub Actions cache variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Set up MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
        cache: true

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: C:/vcpkg/installed
        key: vcpkg-x64-windows-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: vcpkg-x64-windows-

    - name: Install vcpkg dependencies
      run: |
        vcpkg install --triplet x64-windows `
          openssl bzip2 zlib miniupnpc pcre2 lua `
          libiconv libidn2 "gettext[tools]"

    - name: Add vcpkg tools to PATH
      shell: pwsh
      run: |
        $toolsBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/tools"
        if (Test-Path $toolsBase) {
          Get-ChildItem -Path $toolsBase -Directory -Recurse |
            Where-Object { Get-ChildItem $_.FullName -Filter "*.exe" -ErrorAction SilentlyContinue } |
            ForEach-Object { echo $_.FullName >> $env:GITHUB_PATH }
        }
        echo "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin" >> $env:GITHUB_PATH

    - name: Configure
      run: |
        $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DCMAKE_INSTALL_PREFIX="$PWD/install" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DGETTEXT_SEARCH_PATH="$vcpkgBase" `
          -DUSE_QT6=ON `
          -DUSE_GTK3=OFF `
          -DUSE_JS=ON `
          -DUSE_QT_QML=OFF `
          -DUSE_MINIUPNP=ON `
          -DWITH_DHT=ON `
          -DUSE_IDN2=ON `
          -DLUA_SCRIPT=ON `
          -DPERL_REGEX=ON `
          -DUSE_ASPELL=OFF `
          -DDBUS_NOTIFY=OFF `
          -DWITH_EMOTICONS=ON `
          -DWITH_SOUNDS=ON `
          -DBUILD_TESTS=ON `
          -DOPENSSL_MSVC=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: windows-qt6-build-${{ matrix.build_type }}
        path: build/
        retention-days: 1

  build-windows-gtk3:
    name: Windows / GTK3 / MSYS2 (${{ matrix.build_type }})
    runs-on: windows-latest

    strategy:
      matrix:
        build_type: [Debug, Release]

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: true
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-cmake
          mingw-w64-ucrt-x86_64-ninja
          mingw-w64-ucrt-x86_64-pkg-config
          mingw-w64-ucrt-x86_64-gtk3
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-bzip2
          mingw-w64-ucrt-x86_64-zlib
          mingw-w64-ucrt-x86_64-miniupnpc
          mingw-w64-ucrt-x86_64-pcre2
          mingw-w64-ucrt-x86_64-lua
          mingw-w64-ucrt-x86_64-libidn2
          mingw-w64-ucrt-x86_64-gettext-tools
          mingw-w64-ucrt-x86_64-gettext-runtime
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-libnotify

    - uses: actions/checkout@v4

    - name: Configure
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_INSTALL_PREFIX="$PWD/install" \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=OFF \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=OFF \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Test
      run: ctest --test-dir build --output-on-failure

    - name: Upload build tree
      uses: actions/upload-artifact@v4
      with:
        name: windows-gtk3-build-${{ matrix.build_type }}
        path: build/
        retention-days: 1

  test-coverage:
    name: Test Coverage
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext lcov \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Configure with coverage
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_C_FLAGS="--coverage" \
          -DCMAKE_CXX_FLAGS="--coverage" \
          -DCMAKE_EXE_LINKER_FLAGS="--coverage" \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=ON

    - name: Build
      run: cmake --build build

    - name: Run tests
      run: ctest --test-dir build --output-on-failure

    - name: Collect coverage
      run: |
        # Capture coverage data (ignore gcov quirks with system headers)
        lcov --capture --directory build --output-file coverage.info \
          --rc lcov_branch_coverage=1 \
          --ignore-errors mismatch,gcov,inconsistent,source

        # Remove external/system headers, Catch2 sources, and test code from report
        lcov --remove coverage.info \
          '/usr/*' \
          '*/build/_deps/*' \
          '*/build/src/catch2/*' \
          '*/tests/*' \
          --output-file coverage.info \
          --rc lcov_branch_coverage=1 \
          --ignore-errors unused

        # Summary
        lcov --list coverage.info --rc lcov_branch_coverage=1

    - name: Generate HTML report
      run: |
        genhtml coverage.info \
          --output-directory coverage-report \
          --rc lcov_branch_coverage=1 \
          --ignore-errors unmapped,source \
          --title "EiskaltDC++ Test Coverage" \
          --legend

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage-report/

  # ─── Packaging (depends on successful builds) ────────────────────────

  package-windows-qt6:
    name: Package Windows Qt6 (${{ matrix.build_type }})
    runs-on: windows-latest
    needs: build-windows-qt6

    strategy:
      matrix:
        build_type: [Debug, Release]

    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'

    steps:
    - uses: actions/checkout@v4

    - name: Export GitHub Actions cache variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Set up MSVC (for dumpbin)
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Qt6
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.8.3'
        arch: 'win64_msvc2022_64'
        modules: 'qtmultimedia'
        cache: true

    - name: Cache vcpkg packages
      uses: actions/cache@v4
      with:
        path: C:/vcpkg/installed
        key: vcpkg-x64-windows-${{ hashFiles('.github/workflows/build.yml') }}
        restore-keys: vcpkg-x64-windows-

    - name: Install vcpkg dependencies
      run: |
        vcpkg install --triplet x64-windows `
          openssl bzip2 zlib miniupnpc pcre2 lua `
          libiconv libidn2 "gettext[tools]"

    - name: Re-run CMake configure (restore install metadata)
      shell: pwsh
      run: |
        $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
        cmake -B build -G Ninja `
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
          -DCMAKE_INSTALL_PREFIX="$PWD/install" `
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
          -DGETTEXT_SEARCH_PATH="$vcpkgBase" `
          -DUSE_QT6=ON `
          -DUSE_GTK3=OFF `
          -DUSE_JS=ON `
          -DUSE_QT_QML=OFF `
          -DUSE_MINIUPNP=ON `
          -DWITH_DHT=ON `
          -DUSE_IDN2=ON `
          -DLUA_SCRIPT=ON `
          -DPERL_REGEX=ON `
          -DUSE_ASPELL=OFF `
          -DDBUS_NOTIFY=OFF `
          -DWITH_EMOTICONS=ON `
          -DWITH_SOUNDS=ON `
          -DBUILD_TESTS=OFF `
          -DOPENSSL_MSVC=ON

    - name: Install
      shell: pwsh
      run: cmake --install build --config ${{ matrix.build_type }}

    - name: Deploy Qt DLLs
      shell: pwsh
      run: |
        $deployFlag = if ('${{ matrix.build_type }}' -eq 'Debug') { '--debug' } else { '--release' }
        # The exe is at install root (BINDIR=.) named EiskaltDC++.exe
        $exePath = Get-ChildItem install/*.exe | Select-Object -First 1
        windeployqt $deployFlag --no-translations $exePath.FullName

    - name: Resolve and copy DLL dependencies (dumpbin)
      shell: pwsh
      run: |
        $installDir = "install"
        $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
        $searchPaths = if ('${{ matrix.build_type }}' -eq 'Debug') {
          @("$vcpkgBase/debug/bin", "$vcpkgBase/bin")
        } else {
          @("$vcpkgBase/bin")
        }

        $vcRuntimeRe = '^(msvcp\d|vcruntime\d|concrt\d|ucrtbase|vcomp\d)'

        $visited = [System.Collections.Generic.HashSet[string]]::new(
                     [System.StringComparer]::OrdinalIgnoreCase)
        $toCopy  = [ordered]@{}
        $queue   = [System.Collections.Queue]::new()

        # Seed with all exe and dll files in the install tree
        Get-ChildItem $installDir -Recurse -Include *.exe,*.dll -ErrorAction SilentlyContinue |
          ForEach-Object { $queue.Enqueue($_.FullName) }

        while ($queue.Count -gt 0) {
          $file     = $queue.Dequeue()
          $fileName = [IO.Path]::GetFileName($file)
          if (-not $visited.Add($fileName)) { continue }

          $deps = & dumpbin /nologo /dependents $file 2>&1 |
                  Select-String '^\s+(\S+\.dll)\s*$' |
                  ForEach-Object { $_.Matches.Groups[1].Value }

          foreach ($dep in $deps) {
            if ($visited.Contains($dep))                                    { continue }
            if ($dep -like 'api-ms-*' -or $dep -like 'ext-ms-*')           { continue }

            # Already in install dir?
            $inInstall = Get-ChildItem "$installDir/$dep" -ErrorAction SilentlyContinue
            if ($inInstall) {
              $queue.Enqueue($inInstall.FullName)
              continue
            }

            # Search vcpkg
            $found = $false
            foreach ($sp in $searchPaths) {
              $candidate = Join-Path $sp $dep
              if (Test-Path $candidate) {
                $toCopy[$dep] = $candidate
                $queue.Enqueue($candidate)
                $found = $true
                break
              }
            }
            if ($found) { continue }

            # VC runtime from System32
            if ($dep -match $vcRuntimeRe) {
              $sys32 = Join-Path $env:SystemRoot "System32/$dep"
              if (Test-Path $sys32) { $toCopy[$dep] = $sys32 }
            }
          }
        }

        foreach ($entry in $toCopy.GetEnumerator()) {
          Copy-Item $entry.Value "$installDir/"
          Write-Host "  dumpbin: $($entry.Key)  <-  $($entry.Value)"
        }

        # Copy PDB debug symbols when available
        Get-ChildItem 'build/eiskaltdcpp-qt/*.pdb' -ErrorAction SilentlyContinue |
          ForEach-Object { Copy-Item $_.FullName "$installDir/" }
        Get-ChildItem 'build/dcpp/*.pdb' -ErrorAction SilentlyContinue |
          ForEach-Object { Copy-Item $_.FullName "$installDir/" }

        Write-Host "`n=== Install directory contents ==="
        Get-ChildItem $installDir -Recurse | ForEach-Object {
          $rel = $_.FullName.Substring((Resolve-Path $installDir).Path.Length + 1)
          Write-Host "  $rel"
        }

    - name: Build NSIS installer (Release only)
      if: matrix.build_type == 'Release'
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path install-nsis
        # Use CPack with CPACK_INSTALLED_DIRECTORIES to pack the prepared install tree
        $version = (Select-String -Path CMakeLists.txt -Pattern 'set \(APP_VERSION "([^"]+)"' |
                    ForEach-Object { $_.Matches.Groups[1].Value }) | Select-Object -First 1
        cpack -G NSIS `
          -D "CPACK_PACKAGE_NAME=EiskaltDC++" `
          -D "CPACK_PACKAGE_VERSION=$version" `
          -D "CPACK_PACKAGE_VENDOR=EiskaltDC++ developers" `
          -D "CPACK_PACKAGE_DESCRIPTION_SUMMARY=EiskaltDC++ - Direct Connect and ADC client" `
          -D "CPACK_RESOURCE_FILE_LICENSE=$PWD/COPYING" `
          -D "CPACK_NSIS_DISPLAY_NAME=EiskaltDC++" `
          -D "CPACK_NSIS_PACKAGE_NAME=EiskaltDC++" `
          -D "CPACK_NSIS_INSTALL_ROOT=`$PROGRAMFILES64" `
          -D "CPACK_NSIS_ENABLE_UNINSTALL_BEFORE_INSTALL=ON" `
          -D "CPACK_INSTALLED_DIRECTORIES=$PWD/install;." `
          -D "CPACK_PACKAGE_DIRECTORY=$PWD/install-nsis" `
          --verbose 2>&1 | Tee-Object -Variable cpackOut
        Write-Host "`n=== NSIS output ==="
        Get-ChildItem install-nsis/ -ErrorAction SilentlyContinue
      continue-on-error: true

    - name: Upload zip artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-qt6-windows-x64-${{ matrix.build_type }}
        path: install/

    - name: Upload NSIS installer
      if: matrix.build_type == 'Release'
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-qt6-windows-x64-installer
        path: install-nsis/*.exe
        if-no-files-found: ignore

  package-windows-gtk3:
    name: Package Windows GTK3 (${{ matrix.build_type }})
    runs-on: windows-latest
    needs: build-windows-gtk3

    strategy:
      matrix:
        build_type: [Debug, Release]

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Set up MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: false
        install: >-
          mingw-w64-ucrt-x86_64-gcc
          mingw-w64-ucrt-x86_64-gtk3
          mingw-w64-ucrt-x86_64-openssl
          mingw-w64-ucrt-x86_64-bzip2
          mingw-w64-ucrt-x86_64-zlib
          mingw-w64-ucrt-x86_64-miniupnpc
          mingw-w64-ucrt-x86_64-pcre2
          mingw-w64-ucrt-x86_64-lua
          mingw-w64-ucrt-x86_64-libidn2
          mingw-w64-ucrt-x86_64-gettext-runtime
          mingw-w64-ucrt-x86_64-libiconv
          mingw-w64-ucrt-x86_64-libnotify

    - uses: actions/checkout@v4

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: windows-gtk3-build-${{ matrix.build_type }}
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_INSTALL_PREFIX="$PWD/install" \
          -DUSE_QT6=OFF \
          -DUSE_GTK3=ON \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=OFF \
          -DUSE_LIBNOTIFY=ON \
          -DUSE_LIBCANBERRA=OFF \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=OFF

    - name: Install
      run: cmake --install build --config ${{ matrix.build_type }}

    - name: Bundle DLLs and GTK3 runtime
      run: |
        # Copy DLL dependencies using ldd
        ldd install/eiskaltdcpp-gtk.exe \
          | grep -i '/ucrt64/' \
          | awk '{print $3}' \
          | while read -r dll; do
              cp "$dll" install/ 2>/dev/null || true
            done

        echo "=== Bundled DLLs ==="
        ls -1 install/*.dll | wc -l
        ls -1 install/*.dll

        # Bundle GTK3 runtime data
        mkdir -p install/lib
        cp -r /ucrt64/lib/gdk-pixbuf-2.0 install/lib/ 2>/dev/null || true
        LOADERS_DIR="install/lib/gdk-pixbuf-2.0/2.10.0/loaders"
        if [ -d "$LOADERS_DIR" ]; then
          /ucrt64/bin/gdk-pixbuf-query-loaders.exe "$LOADERS_DIR"/*.dll > \
            "install/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
          sed -i 's|.*/loaders/|lib/gdk-pixbuf-2.0/2.10.0/loaders/|g' \
            "install/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache" 2>/dev/null || true
        fi
        mkdir -p install/share/glib-2.0
        cp -r /ucrt64/share/glib-2.0/schemas install/share/glib-2.0/ 2>/dev/null || true
        /ucrt64/bin/glib-compile-schemas install/share/glib-2.0/schemas/ 2>/dev/null || true
        mkdir -p install/share/icons
        cp -r /ucrt64/share/icons/Adwaita install/share/icons/ 2>/dev/null || true
        cp -r /ucrt64/share/icons/hicolor install/share/icons/ 2>/dev/null || true

        # Create launcher script
        printf '%s\r\n' \
          '@echo off' \
          'set "HERE=%~dp0"' \
          'set "GDK_PIXBUF_MODULE_FILE=%HERE%lib\gdk-pixbuf-2.0\2.10.0\loaders.cache"' \
          'set "GDK_PIXBUF_MODULEDIR=%HERE%lib\gdk-pixbuf-2.0\2.10.0\loaders"' \
          'set "GSETTINGS_SCHEMA_DIR=%HERE%share\glib-2.0\schemas"' \
          'set "GTK_EXE_PREFIX=%HERE%"' \
          'set "XDG_DATA_DIRS=%HERE%share"' \
          'start "" "%HERE%eiskaltdcpp-gtk.exe" %*' \
          > install/eiskaltdcpp-gtk.cmd

        echo "=== Install directory ==="
        find install -type f | sort | head -100

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-gtk3-windows-x64-${{ matrix.build_type }}
        path: install/

  package-linux-qt6:
    name: Package Linux Qt6
    runs-on: ubuntu-24.04
    needs: build-linux-qt6

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: linux-qt6-build
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=OFF

    - name: Build .deb package
      run: |
        DESTDIR="$(pwd)/pkg" cmake --install build
        PKG_VERSION=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/' | tr '+' '~')
        ARCH=$(dpkg --print-architecture)
        PKG_NAME="eiskaltdcpp-qt6_${PKG_VERSION}_${ARCH}"
        mkdir -p pkg/DEBIAN
        printf 'Package: eiskaltdcpp-qt6\n' > pkg/DEBIAN/control
        printf 'Version: %s\n' "$PKG_VERSION" >> pkg/DEBIAN/control
        printf 'Section: net\n' >> pkg/DEBIAN/control
        printf 'Priority: optional\n' >> pkg/DEBIAN/control
        printf 'Architecture: %s\n' "$ARCH" >> pkg/DEBIAN/control
        printf 'Depends: libc6, libstdc++6, libssl3t64, libbz2-1.0, zlib1g, libminiupnpc17, libidn2-0, libpcre2-8-0, liblua5.4-0, libaspell15, libqt6core6t64, libqt6gui6t64, libqt6widgets6t64, libqt6xml6t64, libqt6network6t64, libqt6concurrent6t64, libqt6multimedia6, libqt6sql6t64, libqt6svg6, libdbus-1-3\n' >> pkg/DEBIAN/control
        printf 'Maintainer: EiskaltDC++ developers\n' >> pkg/DEBIAN/control
        printf 'Description: EiskaltDC++ - Direct Connect client (Qt6 UI)\n' >> pkg/DEBIAN/control
        printf ' A cross-platform program that uses the Direct Connect and ADC protocols.\n' >> pkg/DEBIAN/control
        printf ' This package contains the Qt6 graphical user interface.\n' >> pkg/DEBIAN/control
        chmod 0755 pkg/DEBIAN
        chmod 0644 pkg/DEBIAN/control
        dpkg-deb --root-owner-group --build pkg "${PKG_NAME}.deb"

    - name: Upload .deb
      uses: actions/upload-artifact@v4
      with:
        name: eiskaltdcpp-qt6-linux-deb
        path: "*.deb"


  package-linux-qt6-appimage:
    name: Package Linux Qt6 AppImage
    runs-on: ubuntu-24.04
    needs: [prepare, build-linux-qt6]
    env:
      AP: ${{ needs.prepare.outputs.artifact_prefix }}
      # linuxdeploy AppImages need FUSE; the GitHub runners lack libfuse2,
      # so tell them to self-extract and run instead of mounting.
      APPIMAGE_EXTRACT_AND_RUN: 1

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y --no-install-recommends \
          cmake ninja-build g++ gettext file desktop-file-utils \
          libbz2-dev zlib1g-dev libssl-dev \
          libminiupnpc-dev libidn2-dev libpcre2-dev \
          liblua5.4-dev libaspell-dev \
          qt6-base-dev qt6-tools-dev qt6-tools-dev-tools \
          qt6-multimedia-dev qt6-declarative-dev \
          qt6-l10n-tools libqt6svg6-dev \
          libgl-dev libdbus-1-dev libsqlite3-dev

    - name: Download build tree
      uses: actions/download-artifact@v4
      with:
        name: ${{ env.AP }}-linux-x64-qt6-Release-buildtree
        path: build/

    - name: Re-run CMake configure (restore install metadata)
      run: |
        cmake -B build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_INSTALL_PREFIX=/usr \
          -DUSE_QT6=ON \
          -DUSE_GTK3=OFF \
          -DUSE_JS=ON \
          -DUSE_QT_QML=OFF \
          -DUSE_MINIUPNP=ON \
          -DWITH_DHT=ON \
          -DUSE_IDN2=ON \
          -DLUA_SCRIPT=ON \
          -DPERL_REGEX=ON \
          -DUSE_ASPELL=ON \
          -DDBUS_NOTIFY=ON \
          -DWITH_EMOTICONS=ON \
          -DWITH_SOUNDS=ON \
          -DBUILD_TESTS=OFF

    - name: Install into AppDir
      run: |
        DESTDIR="$PWD/AppDir" cmake --install build
        echo "=== AppDir tree (top) ==="
        find AppDir -maxdepth 4 -type d | sort | head -60

    - name: Fetch linuxdeploy
      run: |
        base="https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous"
        qtbase="https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous"
        wget -q "${base}/linuxdeploy-x86_64.AppImage"
        wget -q "${qtbase}/linuxdeploy-plugin-qt-x86_64.AppImage"
        chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-qt-x86_64.AppImage

    - name: Build AppImage
      run: |
        version=$(grep 'set (APP_VERSION' CMakeLists.txt | head -1 | sed 's/.*"\(.*\)".*/\1/')
        export QMAKE="$(command -v qmake6)"
        export OUTPUT="EiskaltDC++-Qt6-${version}-x86_64.AppImage"
        # The core library installs to usr/lib/x86_64-linux-gnu inside the
        # AppDir, which is not on the default loader path; expose it so
        # linuxdeploy's dependency resolver can find libeiskaltdcpp.so.*.
        export LD_LIBRARY_PATH="$PWD/AppDir/usr/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
        desktop="AppDir/usr/share/applications/eiskaltdcpp-qt.desktop"
        # Pick the largest available app icon
        icon=$(find AppDir/usr/share/icons/hicolor -name 'eiskaltdcpp.png' | sort -t/ -k7 -r | head -1)
        echo "Using desktop=$desktop icon=$icon QMAKE=$QMAKE"
        ./linuxdeploy-x86_64.AppImage \
          --appdir AppDir \
          --plugin qt \
          --output appimage \
          --desktop-file "$desktop" \
          --icon-file "$icon"
        ls -la *.AppImage

    - name: Upload AppImage
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.AP }}-linux-x64-qt6-appimage
        path: "*.AppImage"

  # ─── macOS Packaging (depends on successful builds) ───────────────


#
# Prebuilt core SDK for language bindings (e.g. eiskaltdcpp-py)
#
# Produces a self-contained shared libeiskaltdcpp plus its public headers,
# built in the SAME toolchain the Python wheels use so the archives are
# ABI-compatible and can be consumed directly instead of rebuilding the
# core from source:
#   - Linux   : manylinux_2_28 container (matches cibuildwheel)
#   - macOS   : Homebrew GCC 14 / libstdc++ (matches cibuildwheel)
#   - Windows : MSVC + vcpkg (matches cibuildwheel)
#
# Archives are named  eiskaltdcpp-core-<tag>-<platform>.{tar.gz,zip}  and
# attached to the GitHub Release for the tag.
#
# Triggers:
#   - Tag push (v*)            -> build and attach to that release
#   - workflow_dispatch        -> retrofit an EXISTING release; supply the
#                                 release_tag input (e.g. v2.5.0)
#
name: Core SDK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing release tag to attach the SDK archives to (e.g. v2.5.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: sdk-${{ github.event.inputs.release_tag || github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Linux (manylinux_2_28, matches cibuildwheel) ───────────────
  sdk-linux:
    name: SDK / Linux x64
    runs-on: ubuntu-24.04
    container: quay.io/pypa/manylinux_2_28_x86_64
    steps:
      - name: Install core build dependencies
        run: |
          dnf install -y \
            openssl-devel zlib-devel bzip2-devel \
            pcre-devel pcre2-devel lua-devel \
            libidn2-devel miniupnpc-devel \
            gettext-devel \
            cmake gcc-c++ ninja-build tar gzip

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Resolve tag and version
        id: info
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION=$(sed -n 's/^set (APP_VERSION "\([^"]*\)").*/\1/p' CMakeLists.txt)
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure core (SDK, core-only)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DEISKALTDCPP_SDK=ON \
            -DNO_UI_DAEMON=ON \
            -DUSE_QT6=OFF -DUSE_QT=OFF -DUSE_QT5=OFF \
            -DUSE_GTK=OFF -DUSE_GTK3=OFF -DUSE_ASPELL=OFF \
            -DJSONRPC_DAEMON=OFF -DXMLRPC_DAEMON=OFF \
            -DUSE_CLI_JSONRPC=OFF -DUSE_CLI_XMLRPC=OFF \
            -DWITH_DEV_FILES=OFF -DWITH_EMOTICONS=OFF \
            -DWITH_EXAMPLES=OFF -DWITH_SOUNDS=OFF -DWITH_LUASCRIPTS=OFF \
            -DWITH_DHT=ON -DLUA_SCRIPT=ON -DUSE_MINIUPNP=ON \
            -DUSE_IDN2=ON -DPERL_REGEX=ON \
            -DBUILD_TESTS=OFF

      - name: Build core library
        run: cmake --build build --target dcpp

      - name: Stage SDK
        id: stage
        run: |
          TAG="${{ steps.info.outputs.tag }}"
          NAME="eiskaltdcpp-core-${TAG}-linux-x64"
          SDK="staging/${NAME}"
          mkdir -p "${SDK}/include/eiskaltdcpp/dcpp" \
                   "${SDK}/include/eiskaltdcpp/extra" \
                   "${SDK}/lib"
          cp dcpp/*.h  "${SDK}/include/eiskaltdcpp/dcpp/"
          cp extra/*.h "${SDK}/include/eiskaltdcpp/extra/"
          cp -P build/dcpp/libeiskaltdcpp.so* "${SDK}/lib/"
          cp COPYING "${SDK}/" 2>/dev/null || true
          cat > "${SDK}/eiskaltdcpp-sdk.txt" <<EOF
          name=eiskaltdcpp-core
          version=${{ steps.info.outputs.version }}
          tag=${TAG}
          platform=linux-x64
          link=shared
          toolchain=manylinux_2_28-gcc
          flags=NO_UI_DAEMON=ON;LUA_SCRIPT=ON;WITH_DHT=ON;USE_MINIUPNP=ON;USE_IDN2=ON;PERL_REGEX=ON
          EOF
          ( cd staging && tar czf "../${NAME}.tar.gz" "${NAME}" )
          echo "archive=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "== NEEDED (should be system libs only) =="
          readelf -d "${SDK}/lib/"libeiskaltdcpp.so.* | grep NEEDED || true

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-linux-x64
          path: ${{ steps.stage.outputs.archive }}
          retention-days: 3

  # ─── macOS (Homebrew GCC 14, matches cibuildwheel) ──────────────
  sdk-macos:
    name: SDK / macOS ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Install dependencies
        run: |
          brew update
          brew install cmake ninja gettext openssl@3 bzip2 zlib \
            miniupnpc libidn2 pcre2 lua gcc

      - name: Resolve tag and version
        id: info
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION=$(sed -n 's/^set (APP_VERSION "\([^"]*\)").*/\1/p' CMakeLists.txt)
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure core (SDK, core-only)
        run: |
          HB="$(brew --prefix)"
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DEISKALTDCPP_SDK=ON \
            -DCMAKE_C_COMPILER="$(brew --prefix gcc)/bin/gcc-14" \
            -DCMAKE_CXX_COMPILER="$(brew --prefix gcc)/bin/g++-14" \
            -DOPENSSL_ROOT_DIR="$(brew --prefix openssl@3)" \
            -DCMAKE_PREFIX_PATH="$(brew --prefix openssl@3);$(brew --prefix bzip2);$(brew --prefix pcre2);$(brew --prefix miniupnpc);$(brew --prefix libidn2);$(brew --prefix lua);$(brew --prefix gettext)" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DNO_UI_DAEMON=ON \
            -DUSE_QT6=OFF -DUSE_QT=OFF -DUSE_QT5=OFF \
            -DUSE_GTK=OFF -DUSE_GTK3=OFF -DUSE_ASPELL=OFF \
            -DJSONRPC_DAEMON=OFF -DXMLRPC_DAEMON=OFF \
            -DUSE_CLI_JSONRPC=OFF -DUSE_CLI_XMLRPC=OFF \
            -DWITH_DEV_FILES=OFF -DWITH_EMOTICONS=OFF \
            -DWITH_EXAMPLES=OFF -DWITH_SOUNDS=OFF -DWITH_LUASCRIPTS=OFF \
            -DWITH_DHT=ON -DLUA_SCRIPT=ON -DUSE_MINIUPNP=ON \
            -DUSE_IDN2=ON -DPERL_REGEX=ON \
            -DBUILD_TESTS=OFF

      - name: Build core library
        run: cmake --build build --target dcpp

      - name: Stage SDK
        id: stage
        run: |
          TAG="${{ steps.info.outputs.tag }}"
          NAME="eiskaltdcpp-core-${TAG}-macos-${{ matrix.arch }}"
          SDK="staging/${NAME}"
          mkdir -p "${SDK}/include/eiskaltdcpp/dcpp" \
                   "${SDK}/include/eiskaltdcpp/extra" \
                   "${SDK}/lib"
          cp dcpp/*.h  "${SDK}/include/eiskaltdcpp/dcpp/"
          cp extra/*.h "${SDK}/include/eiskaltdcpp/extra/"
          cp -P build/dcpp/libeiskaltdcpp*.dylib "${SDK}/lib/"
          cp COPYING "${SDK}/" 2>/dev/null || true
          cat > "${SDK}/eiskaltdcpp-sdk.txt" <<EOF
          name=eiskaltdcpp-core
          version=${{ steps.info.outputs.version }}
          tag=${TAG}
          platform=macos-${{ matrix.arch }}
          link=shared
          toolchain=homebrew-gcc14
          flags=NO_UI_DAEMON=ON;LUA_SCRIPT=ON;WITH_DHT=ON;USE_MINIUPNP=ON;USE_IDN2=ON;PERL_REGEX=ON
          EOF
          ( cd staging && tar czf "../${NAME}.tar.gz" "${NAME}" )
          echo "archive=${NAME}.tar.gz" >> "$GITHUB_OUTPUT"
          echo "== install name / deps =="
          otool -L "${SDK}/lib/"libeiskaltdcpp*.dylib || true

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-macos-${{ matrix.arch }}
          path: ${{ steps.stage.outputs.archive }}
          retention-days: 3

  # ─── Windows (MSVC + vcpkg, matches cibuildwheel) ───────────────
  sdk-windows:
    name: SDK / Windows x64
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: 'clear;x-gha,readwrite'
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref }}

      - name: Export GitHub Actions cache variables
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install vcpkg dependencies
        run: |
          vcpkg install --triplet x64-windows `
            openssl bzip2 zlib miniupnpc pcre2 lua `
            libiconv libidn2 gettext

      - name: Install gettext tools (MSYS2)
        run: C:\msys64\usr\bin\pacman.exe -S --noconfirm --needed gettext

      - name: Resolve tag and version
        id: info
        shell: bash
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            TAG="${{ github.event.inputs.release_tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION=$(sed -n 's/^set (APP_VERSION "\([^"]*\)").*/\1/p' CMakeLists.txt)
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Configure core (SDK, core-only)
        run: |
          $vcpkgBase = "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows"
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DEISKALTDCPP_SDK=ON `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DGETTEXT_SEARCH_PATH="$vcpkgBase" `
            -DNO_UI_DAEMON=ON `
            -DUSE_QT6=OFF -DUSE_QT=OFF -DUSE_QT5=OFF `
            -DUSE_GTK=OFF -DUSE_GTK3=OFF -DUSE_ASPELL=OFF `
            -DJSONRPC_DAEMON=OFF -DXMLRPC_DAEMON=OFF `
            -DUSE_CLI_JSONRPC=OFF -DUSE_CLI_XMLRPC=OFF `
            -DWITH_DEV_FILES=OFF -DWITH_EMOTICONS=OFF `
            -DWITH_EXAMPLES=OFF -DWITH_SOUNDS=OFF -DWITH_LUASCRIPTS=OFF `
            -DWITH_DHT=ON -DLUA_SCRIPT=ON -DUSE_MINIUPNP=ON `
            -DUSE_IDN2=ON -DPERL_REGEX=ON `
            -DOPENSSL_MSVC=ON `
            -DBUILD_TESTS=OFF

      - name: Build core library
        run: cmake --build build --target dcpp

      - name: Stage SDK
        id: stage
        shell: bash
        run: |
          TAG="${{ steps.info.outputs.tag }}"
          NAME="eiskaltdcpp-core-${TAG}-windows-x64"
          SDK="staging/${NAME}"
          mkdir -p "${SDK}/include/eiskaltdcpp/dcpp" \
                   "${SDK}/include/eiskaltdcpp/extra" \
                   "${SDK}/lib" "${SDK}/bin"
          cp dcpp/*.h  "${SDK}/include/eiskaltdcpp/dcpp/"
          cp extra/*.h "${SDK}/include/eiskaltdcpp/extra/"
          # Import library (.lib) for linking + DLL for runtime
          find build -name 'eiskaltdcpp.lib' -exec cp {} "${SDK}/lib/" \;
          find build -name 'eiskaltdcpp.dll' -exec cp {} "${SDK}/bin/" \;
          cp COPYING "${SDK}/" 2>/dev/null || true
          cat > "${SDK}/eiskaltdcpp-sdk.txt" <<EOF
          name=eiskaltdcpp-core
          version=${{ steps.info.outputs.version }}
          tag=${TAG}
          platform=windows-x64
          link=shared
          toolchain=msvc-vcpkg
          flags=NO_UI_DAEMON=ON;LUA_SCRIPT=ON;WITH_DHT=ON;USE_MINIUPNP=ON;USE_IDN2=ON;PERL_REGEX=ON
          EOF
          echo "== staged files =="; find "${SDK}" -maxdepth 3 -type f | sort

      - name: Archive SDK (zip)
        shell: pwsh
        run: |
          $tag = "${{ steps.info.outputs.tag }}"
          $name = "eiskaltdcpp-core-$tag-windows-x64"
          Compress-Archive -Path "staging/$name" -DestinationPath "$name.zip"
          "archive=$name.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
        id: archive

      - uses: actions/upload-artifact@v4
        with:
          name: sdk-windows-x64
          path: ${{ steps.archive.outputs.archive }}
          retention-days: 3

  # ─── Attach all SDK archives to the release ─────────────────────
  attach:
    name: Attach SDKs to release
    runs-on: ubuntu-latest
    needs: [sdk-linux, sdk-macos, sdk-windows]
    steps:
      - name: Download SDK archives
        uses: actions/download-artifact@v4
        with:
          path: sdks/
          pattern: sdk-*
          merge-multiple: true

      - name: List archives
        run: ls -la sdks/

      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: sdks/*
